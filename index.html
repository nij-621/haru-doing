<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HaruDoing</title>
<meta name="theme-color" content="#F6F5F3">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="topbar">
  <div class="date-nav">
    <button id="btn-prev" class="icon-btn" aria-label="Previous day">‹</button>
    <button id="btn-date" class="date-label"></button>
    <button id="btn-next" class="icon-btn" aria-label="Next day">›</button>
  </div>
  <div class="top-actions">
    <button id="btn-today" class="chip-btn">Today</button>
    <div id="view-seg" role="group" aria-label="View mode">
      <button data-view="list">List</button>
      <button data-view="timeline">Timeline</button>
    </div>
    <button id="btn-snap" class="icon-btn" title="Save as image" aria-label="Save as image"><span data-ui-icon="ui-camera" data-size="20"></span></button>
  </div>
</header>

<main>
  <!-- Today tab -->
  <section id="tab-today">
    <div id="next-up" hidden></div>
    <div id="work-card" class="card" hidden></div>
    <div id="carry-note" class="carry-note" hidden></div>
    <div id="list-view"></div>
    <div id="timeline-view" hidden>
      <div id="tl-unsched"></div>
      <div id="tl-grid"></div>
    </div>
    <div id="mood-card" class="card">
      <div id="mood-line" hidden></div>
      <div id="mood-row"></div>
      <button id="diary-ghost" class="diary-ghost" hidden></button>
      <input id="diary-input" type="text" maxlength="120" placeholder="One-line diary for today">
    </div>
  </section>

  <!-- Inbox tab -->
  <section id="tab-inbox" hidden>
    <h2 class="section-title"><span data-ui-icon="ui-inbox" data-size="22"></span>Inbox</h2>
    <p class="section-desc">A place for tasks without a date. Send them to today when you're ready.</p>
    <div id="inbox-sort" role="group" aria-label="Sort inbox" hidden>
      <button data-sort="recent">Recent</button>
      <button data-sort="oldest">Oldest</button>
    </div>
    <div id="inbox-list"></div>
  </section>

  <!-- All (monthly) tab -->
  <section id="tab-month" hidden>
    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Search tasks — find when you did something">
      <button id="search-clear" class="icon-btn" hidden>✕</button>
    </div>
    <div id="search-results" hidden></div>
    <div class="month-nav">
      <button id="btn-mprev" class="icon-btn">‹</button>
      <span id="month-label"></span>
      <button id="btn-mnext" class="icon-btn">›</button>
    </div>
    <div id="month-list"></div>
  </section>

  <!-- Settings tab -->
  <section id="tab-settings" hidden>
    <h2 class="section-title"><span data-ui-icon="ui-settings" data-size="22"></span>Settings</h2>
    <div class="card set-card">
      <label class="set-row">Font
        <select id="set-font">
          <option value="sans">Default</option>
          <option value="gaegu">Gaegu (handwriting)</option>
          <option value="pen">Nanum Pen (handwriting)</option>
          <option value="dodum">Gowun Dodum</option>
        </select>
      </label>
      <label class="set-row">Font size
        <input id="set-size" type="range" min="14" max="20" step="1">
      </label>
      <label class="set-row">Theme
        <select id="set-theme">
          <option value="auto">Follow system</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <label class="set-row">Task time notifications
        <input id="set-notify" type="checkbox">
      </label>
    </div>
    <div class="card set-card" id="work-settings">
      <div class="set-head">Work tracking</div>
      <label class="set-row">Base hours Mon–Thu <input id="ws-base" type="text" class="dur-input" placeholder="8:00"></label>
      <label class="set-row">Base hours Friday <input id="ws-fri" type="text" class="dur-input" placeholder="6:30"></label>
      <label class="set-row">Lunch deduction (min) <input id="ws-lunch" type="number" class="dur-input" min="0" max="120" step="5"></label>
      <label class="set-row">Daily overtime cap <input id="ws-cap" type="text" class="dur-input" placeholder="2:00"></label>
      <label class="set-row">Opening balance <input id="ws-open" type="text" class="dur-input" placeholder="+3:15"></label>
      <label class="set-row">Balance counted from <input id="ws-openm" type="month"></label>
    </div>
    <div class="card set-card">
      <button id="btn-export" class="wide-btn"><span data-ui-icon="ui-export" data-size="17"></span>Export data (backup)</button>
      <button id="btn-import" class="wide-btn"><span data-ui-icon="ui-import" data-size="17"></span>Import data</button>
      <input id="import-file" type="file" accept=".json" hidden>
      <button id="btn-wipe" class="wide-btn danger"><span data-ui-icon="trash" data-size="17"></span>Delete all data</button>
    </div>
    <p class="about">HaruDoing · my personal day planner<br>All data stays on this device only.</p>
  </section>
</main>

<button id="fab" aria-label="New task"><span data-ui-icon="ui-plus" data-size="26"></span></button>

<nav id="tabbar">
  <button data-tab="today" class="active"><span class="nav-ico" data-ui-icon="home" data-size="23"></span><span>Today</span></button>
  <button data-tab="inbox"><span class="nav-ico" data-ui-icon="ui-inbox" data-size="23"></span><span>Inbox</span></button>
  <button data-tab="month"><span class="nav-ico" data-ui-icon="ui-all" data-size="23"></span><span>All</span></button>
  <button data-tab="settings"><span class="nav-ico" data-ui-icon="ui-settings" data-size="23"></span><span>Settings</span></button>
</nav>

<!-- Status picker popover -->
<div id="popover" hidden></div>

<!-- Move task dialog (shown after Doing/Defer) -->
<div id="move-modal" hidden>
  <div id="move-card">
    <button id="mv-tomorrow" class="mv-btn mv-top">＋ Add to tomorrow's tasks</button>
    <button id="mv-pick" class="mv-btn">Pick another date</button>
    <div id="mv-date-row" hidden>
      <input id="mv-date" type="date">
      <button id="mv-date-go" class="mv-btn">Move</button>
    </div>
    <button id="mv-ok" class="mv-btn">OK</button>
  </div>
</div>

<!-- Add/edit task modal -->
<div id="modal" hidden>
  <div id="modal-card" class="card">
    <h3 id="modal-title">New task</h3>
    <input id="f-title" type="text" placeholder="What will you do?" maxlength="80">
    <div class="f-row two">
      <label>Date <input id="f-date" type="date"></label>
      <label>Time <input id="f-time" type="time"></label>
    </div>
    <div class="f-row two">
      <label>Duration
        <select id="f-dur">
          <option value="">-</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 hour</option>
          <option value="90">1.5 hours</option>
          <option value="120">2 hours</option>
          <option value="180">3 hours</option>
        </select>
      </label>
      <label>Repeat
        <select id="f-repeat">
          <option value="">None</option>
          <option value="daily">Daily</option>
          <option value="weekdays">Weekdays</option>
          <option value="weekly">Weekly</option>
        </select>
      </label>
    </div>
    <div class="f-secondary">
      <div class="f-row">
        <label>Icon</label>
        <div id="emoji-picks"></div>
      </div>
      <div class="f-row">
        <label>Color</label>
        <div id="color-picks"></div>
      </div>
    </div>
    <textarea id="f-note" rows="2" placeholder="Notes (optional)"></textarea>
    <div id="modal-btns">
      <button id="btn-del" class="chip-btn danger" hidden>Delete</button>
      <button id="btn-del-series" class="chip-btn danger" hidden>Delete series</button>
      <span class="spacer"></span>
      <button id="btn-cancel" class="chip-btn">Cancel</button>
      <button id="btn-save" class="chip-btn primary">Save</button>
    </div>
  </div>
</div>

<!-- Work report (full-screen overlay) -->
<section id="work-report" hidden>
  <header id="wr-top">
    <button id="wr-back" class="icon-btn" aria-label="Close report">‹</button>
    <div class="month-nav">
      <button id="wr-mprev" class="icon-btn">‹</button>
      <span id="wr-month"></span>
      <button id="wr-mnext" class="icon-btn">›</button>
    </div>
    <button id="wr-csv" class="chip-btn">CSV</button>
  </header>
  <div id="wr-body">
    <div id="wr-summary"></div>
    <div class="wr-controls">
      <div id="wr-seg" role="group" aria-label="Report view">
        <button data-wview="days">Days</button>
        <button data-wview="entry">Entry</button>
      </div>
      <label id="wr-autofill" class="set-row" hidden>Fill short days from balance <input id="wr-af" type="checkbox"></label>
    </div>
    <div id="wr-list"></div>
  </div>
</section>

<!-- Work day editor -->
<div id="work-modal" hidden>
  <div id="wm-card" class="card">
    <h3 id="wm-title">Work hours</h3>
    <div class="f-row two">
      <label>Day type
        <select id="wm-type">
          <option value="work">Work</option>
          <option value="vacation">Vacation</option>
          <option value="holiday">Holiday</option>
          <option value="sick">Sick</option>
        </select>
      </label>
      <label>Home office
        <span class="wm-home-wrap"><input id="wm-home" type="checkbox" class="hd-switch"></span>
      </label>
    </div>
    <div class="f-row">
      <label>Work periods</label>
      <div id="wm-segs"></div>
      <button id="wm-addseg" class="mini-btn">＋ Add period</button>
    </div>
    <div class="f-row">
      <label>Company entry override (optional)</label>
      <div class="wm-seg"><input id="wm-es" type="time"><span>–</span><input id="wm-ee" type="time"></div>
    </div>
    <input id="wm-note" type="text" maxlength="60" placeholder="Note (e.g. business trip location)">
    <div class="wm-btns">
      <button id="wm-del" class="chip-btn danger">Clear day</button>
      <span class="spacer"></span>
      <button id="wm-cancel" class="chip-btn">Cancel</button>
      <button id="wm-save" class="chip-btn primary">Save</button>
    </div>
  </div>
</div>

<canvas id="snap-canvas" hidden></canvas>
<script src="icons-data.js"></script>
<script src="icons.js"></script>
<script src="app.js"></script>
<script src="work.js"></script>
</body>
</html>

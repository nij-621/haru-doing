<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HaruDoing</title>
<meta name="theme-color" content="#F6F5F3">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Gowun+Dodum&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="topbar">
  <div class="date-nav">
    <button id="btn-prev" class="icon-btn" aria-label="Previous day">‹</button>
    <button id="btn-date" class="date-label"></button>
    <button id="btn-next" class="icon-btn" aria-label="Next day">›</button>
  </div>
  <div class="top-actions">
    <button id="btn-today" class="chip-btn">Today</button>
    <button id="btn-view" class="chip-btn" title="Switch list/timeline">🕐 Timeline</button>
    <button id="btn-snap" class="icon-btn" title="Save as image">📷</button>
  </div>
</header>

<main>
  <!-- Today tab -->
  <section id="tab-today">
    <div id="mood-card" class="card">
      <div id="mood-row"></div>
      <input id="diary-input" type="text" maxlength="120" placeholder="One-line diary for today ✎">
    </div>
    <div id="carry-note" class="carry-note" hidden></div>
    <div id="list-view"></div>
    <div id="timeline-view" hidden>
      <div id="tl-unsched"></div>
      <div id="tl-grid"></div>
    </div>
  </section>

  <!-- Inbox tab -->
  <section id="tab-inbox" hidden>
    <h2 class="section-title">📥 Inbox</h2>
    <p class="section-desc">A place for tasks without a date. Send them to today when you're ready.</p>
    <div id="inbox-list"></div>
  </section>

  <!-- All (monthly) tab -->
  <section id="tab-month" hidden>
    <div id="search-bar">
      <input id="search-input" type="search" placeholder="🔍 Search tasks — find when you did something">
      <button id="search-clear" class="icon-btn" hidden>✕</button>
    </div>
    <div id="search-results" hidden></div>
    <div class="month-nav">
      <button id="btn-mprev" class="icon-btn">‹</button>
      <span id="month-label"></span>
      <button id="btn-mnext" class="icon-btn">›</button>
    </div>
    <div id="month-list"></div>
  </section>

  <!-- Settings tab -->
  <section id="tab-settings" hidden>
    <h2 class="section-title">⚙️ Settings</h2>
    <div class="card set-card">
      <label class="set-row">Font
        <select id="set-font">
          <option value="sans">Default</option>
          <option value="gaegu">Gaegu (handwriting)</option>
          <option value="pen">Nanum Pen (handwriting)</option>
          <option value="dodum">Gowun Dodum</option>
        </select>
      </label>
      <label class="set-row">Font size
        <input id="set-size" type="range" min="14" max="20" step="1">
      </label>
      <label class="set-row">Theme
        <select id="set-theme">
          <option value="auto">Follow system</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </label>
      <label class="set-row">Task time notifications
        <input id="set-notify" type="checkbox">
      </label>
    </div>
    <div class="card set-card">
      <button id="btn-export" class="wide-btn">📤 Export data (backup)</button>
      <button id="btn-import" class="wide-btn">📥 Import data</button>
      <input id="import-file" type="file" accept=".json" hidden>
      <button id="btn-wipe" class="wide-btn danger">🗑 Delete all data</button>
    </div>
    <p class="about">HaruDoing · my personal day planner<br>All data stays on this device only.</p>
  </section>
</main>

<button id="fab" aria-label="New task">＋</button>

<nav id="tabbar">
  <button data-tab="today" class="active">🏠<span>Today</span></button>
  <button data-tab="inbox">📥<span>Inbox</span></button>
  <button data-tab="month">📅<span>All</span></button>
  <button data-tab="settings">⚙️<span>Settings</span></button>
</nav>

<!-- Status picker popover -->
<div id="popover" hidden></div>

<!-- Move task dialog (shown after Doing/Defer) -->
<div id="move-modal" hidden>
  <div id="move-card">
    <button id="mv-tomorrow" class="mv-btn mv-top">＋ Add to tomorrow's tasks</button>
    <button id="mv-pick" class="mv-btn">Pick another date</button>
    <div id="mv-date-row" hidden>
      <input id="mv-date" type="date">
      <button id="mv-date-go" class="mv-btn">Move</button>
    </div>
    <button id="mv-ok" class="mv-btn">OK</button>
  </div>
</div>

<!-- Add/edit task modal -->
<div id="modal" hidden>
  <div id="modal-card" class="card">
    <h3 id="modal-title">New task</h3>
    <input id="f-title" type="text" placeholder="What will you do?" maxlength="80">
    <div class="f-row">
      <label>Icon</label>
      <div id="emoji-picks"></div>
    </div>
    <div class="f-row">
      <label>Color</label>
      <div id="color-picks"></div>
    </div>
    <div class="f-row two">
      <label>Date <input id="f-date" type="date"></label>
      <label>Time <input id="f-time" type="time"></label>
    </div>
    <div class="f-row two">
      <label>Duration
        <select id="f-dur">
          <option value="">-</option>
          <option value="15">15 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 hour</option>
          <option value="90">1.5 hours</option>
          <option value="120">2 hours</option>
          <option value="180">3 hours</option>
        </select>
      </label>
      <label>Repeat
        <select id="f-repeat">
          <option value="">None</option>
          <option value="daily">Daily</option>
          <option value="weekdays">Weekdays</option>
          <option value="weekly">Weekly</option>
        </select>
      </label>
    </div>
    <textarea id="f-note" rows="2" placeholder="Notes (optional)"></textarea>
    <div id="modal-btns">
      <button id="btn-del" class="chip-btn danger" hidden>Delete</button>
      <button id="btn-del-series" class="chip-btn danger" hidden>Delete series</button>
      <span class="spacer"></span>
      <button id="btn-cancel" class="chip-btn">Cancel</button>
      <button id="btn-save" class="chip-btn primary">Save</button>
    </div>
  </div>
</div>

<canvas id="snap-canvas" hidden></canvas>
<script src="app.js"></script>
</body>
</html>
